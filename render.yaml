services:
  - type: web
    name: sentinelai-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        generateValue: false
        value: sqlite:///./sentinelai.db
    plan: free
    autoDeploy: true
