kind = "web"
previewPath = "/"
title = "AI Security Platform"
version = "1.0.0"
id = "artifacts/security-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19744

[services.development]
run = "pnpm --filter @workspace/security-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/security-platform", "run", "build" ]
publicDir = "artifacts/security-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19744"
BASE_PATH = "/"
